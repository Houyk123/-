<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小管理员视频展示</title>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面背景 */
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f0f2f5; /* 浅灰色背景，看起来更舒服 */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 白色卡片容器 */
        .video-container {
            width: 100%;
            max-width: 1000px;
            background-color: white;
            padding: 25px;
            border-radius: 16px; /* 圆角更大气 */
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        /* 标题样式 */
        .video-title {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-size: 24px;
            font-weight: 600;
        }

        /* B站播放器容器 */
        .video-wrapper {
            position: relative;
            width: 100%;
            /* 强制保持 16:9 比例，防止拉伸 */
            aspect-ratio: 16 / 9;
            background-color: #000; /* 加载前黑色背景，匹配视频画面 */
            border-radius: 12px;
            overflow: hidden;
        }

        /* iframe 样式 */
        .bilibili-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 手机适配 */
        @media (max-width: 768px) {
            .video-title {
                font-size: 20px;
            }
            .video-container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="video-container">
        <h1 class="video-title">小管理员的企鹅饼干</h1>
        
        <!-- 核心播放区域：修复好的 src，包含 https 和完整参数 -->
        <div class="video-wrapper">
            <iframe src="//player.bilibili.com/player.html?isOutside=true&aid=116226864973713&bvid=BV1MvwxzGEuF&cid=36692430253&p=1" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true" style="width: 100%; height: 100%; border: none; display: block;"></iframe>
    </div>
</body>
</html>
