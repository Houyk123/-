<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双视频展示页面</title>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面整体布局 */
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
        }

        /* 双栏容器 */
        .video-wrapper {
            display: flex;
            gap: 20px; /* 左右框之间的间距 */
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* 左右视频框通用样式 */
        .video-box {
            flex: 1; /* 两个框平分宽度 */
            background-color: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        /* 标题样式 */
        .video-title {
            text-align: center;
            margin-bottom: 15px;
            color: #333;
            font-size: 20px;
            font-weight: 600;
        }

        /* 视频容器（保持16:9比例） */
        .iframe-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        /* 嵌入iframe样式 */
        .video-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 手机适配：小屏幕时上下排列 */
        @media (max-width: 768px) {
            .video-wrapper {
                flex-direction: column;
            }
            .video-title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="video-wrapper">
        <!-- 左侧视频框：嵌入 index.html -->
        <div class="video-box">
            <h2 class="video-title">给小管理员吃她最喜欢的企鹅饼干</h2>
            <div class="iframe-container">
                <iframe class="video-iframe" src="index1.html" allowfullscreen></iframe>
            </div>
        </div>

        <!-- 右侧视频框：嵌入 index2.html -->
        <div class="video-box">
            <h2 class="video-title">小企鹅向你发出了吃宵夜的邀请~</h2>
            <div class="iframe-container">
                <iframe class="video-iframe" src="index2.html" allowfullscreen></iframe>
            </div>
        </div>
    </div>
</body>
</html>
